name: Quickie
options:
  bundleIdPrefix: com.boggybumblebee
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    DEVELOPMENT_TEAM: N849L4J586
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: Apple Development
targets:
  Quickie:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - Info.plist
          - Quickie.entitlements
      - path: ../Resources/Assets.xcassets
        buildPhase: resources
      - path: ../Resources/Help
        buildPhase: resources
      - path: ../Resources/Assets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boggybumblebee.quickie
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/Quickie.entitlements
        ENABLE_HARDENED_RUNTIME: YES
  QuickieTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ../Tests
    dependencies:
      - target: Quickie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boggybumblebee.quickie.tests
        GENERATE_INFOPLIST_FILE: YES
  QuickieUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ../UITests
    dependencies:
      - target: Quickie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boggybumblebee.quickie.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Quickie:
    build:
      targets:
        Quickie: all
        QuickieTests: [test]
    test:
      targets:
        - QuickieTests
  QuickieUI:
    build:
      targets:
        Quickie: all
        QuickieUITests: [test]
    test:
      targets:
        - QuickieUITests
